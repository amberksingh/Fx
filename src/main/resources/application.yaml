spring:
  application:
    name: Fx
  datasource:
    url: jdbc:mysql://localhost:3306/fxAccount
    username: root
    password: root
    driver-class-name: com.mysql.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
#    properties:
#      hibernate:
#        dialect: org.hibernate.dialect.MySQL8Dialect
  cloud:
    openfeign:
      circuitbreaker:
        enabled: true
      client:
        config:
          payment-service:
            connectTimeout: 2000      # 2 seconds to connect
            readTimeout: 3000         # 5 seconds to wait for response

#below if uncommented will enable dev profile if we run through normally without terminal mvn command
